name: Check stale articles

on:
  schedule:
    # 毎月1日 00:00 UTC
    - cron: "0 0 1 * *"
  workflow_dispatch:

jobs:
  check-stale:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Run last_verified check
        run: python scripts/check_last_verified.py --ci
