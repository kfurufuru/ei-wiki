site_name: "電気計装 実務Wiki"
site_description: "電気計装エンジニアのフィールドリファレンス — 困ったらここを見る"
site_url: "https://kfurufuru.github.io/ei-wiki/"
repo_url: "https://github.com/kfurufuru/ei-wiki"
repo_name: "ei-wiki"
copyright: "&copy; 2026 Furutachi — 社内実務参照用"

theme:
  name: material
  custom_dir: docs/overrides
  language: ja
  palette:
    - scheme: default
      primary: teal
      accent: cyan
      toggle:
        icon: material/brightness-7
        name: ダークモードに切り替え
    - scheme: slate
      primary: teal
      accent: cyan
      toggle:
        icon: material/brightness-4
        name: ライトモードに切り替え
  features:
    - navigation.tabs
    - navigation.tabs.sticky
    - navigation.sections
    - navigation.indexes
    - navigation.top
    - navigation.instant
    - navigation.instant.progress
    - navigation.path
    - search.suggest
    - search.highlight
    - search.share
    - content.tabs.link
    - content.tooltips
    - toc.follow
  icon:
    repo: fontawesome/brands/github

plugins:
  - search:
      lang: ja
  - tags
  - sitemap:
      priority: 1.0
      changefreq: weekly

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.tabbed:
      alternate_style: true
  - tables
  - attr_list
  - md_in_html
  - def_list
  - footnotes
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
  - toc:
      permalink: true
  - abbr
  - pymdownx.mark
  - pymdownx.snippets:
      auto_append:
        - includes/abbreviations.md

extra_css:
  - stylesheets/custom.css

extra_javascript:
  - javascripts/cable-calc.js

extra:
  # OGP メタデータ（ChatGPT・SNS共有用）
  og_image: "https://kfurufuru.github.io/ei-wiki/og-image.png"
  og_image_alt: "電気計装 実務Wiki"
  og_type: "website"
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/kfurufuru/ei-wiki
      name: GitHub リポジトリ

